<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06172f" />
  <title>Academic Vocabulary Network Adventure</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-label="App status">
      <div>
        <p class="eyebrow">Academic Vocabulary Network</p>
        <h1>Deep Sea of Thought</h1>
      </div>
      <div class="shark-badge" aria-label="Shark Sensei level">
        <span class="shark-face">🦈</span>
        <span id="levelLabel">Lv.1</span>
      </div>
    </header>

    <main id="app" class="screen" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-btn" data-nav="home" type="button">🏠<span>Home</span></button>
      <button class="nav-btn" data-nav="map" type="button">🗺️<span>Map</span></button>
      <button class="nav-btn" data-nav="cards" type="button">🃏<span>Cards</span></button>
      <button class="nav-btn" data-nav="weak" type="button">🫧<span>Weak</span></button>
      <button class="nav-btn" data-nav="reset" type="button">↺<span>Reset</span></button>
    </nav>
  </div>

  <noscript>このアプリを使うにはJavaScriptを有効にしてください。</noscript>
  <script src="app.js" defer></script>
</body>
</html>
